# fly.toml — Fly.io deploy config for the agent_runner service.
#
# This file lives at the REPO ROOT (not inside agent_runner/) so that
# Fly's default build context — the directory containing fly.toml — is
# the repo root. The Dockerfile needs to COPY from bots/, league_core/,
# and scripts/, which all live at the repo root.
#
# Deploy from the REPO ROOT with:
#
#     fly deploy
#     # → builds the image from this directory using agent_runner/Dockerfile
#
# After deploy, tail logs with:
#     fly logs
#
# To set or rotate secrets:
#     fly secrets set FOO='...' BAR='...'

app = 'trading-bot-league-agent-runner'
primary_region = 'iad'

# Build from agent_runner/Dockerfile. Build context is this directory
# (the repo root) by default since fly.toml lives here.
[build]
  dockerfile = 'agent_runner/Dockerfile'

# No HTTP service — the scheduler is a pure background worker. We don't
# expose any inbound ports. There's no [[services]] block, which means
# Fly's auto-stop-on-no-traffic logic doesn't apply to this machine at
# all. We rely on the machine's restart_policy ('always' for background
# workers; set explicitly via `fly machine update --restart=always` if
# it isn't already — see Notes below) so any process exit gets restarted.
[[vm]]
  size = 'shared-cpu-1x'
  # Bumped from 256mb -> 512mb on 2026-06-01 for the stock_momentum_v1
  # and crypto_ema_atr_v1 migration. pandas + numpy resident during a
  # stock cycle adds ~50-100mb; the old 256mb was fine for the
  # paper/research bots (idled ~80mb, peaked ~150mb) but too tight once
  # the live bots also run in-process. Adds ~$2/month.
  memory = '512mb'

[deploy]
  # Single machine, never scale to zero — we need the scheduler awake.
  strategy = 'immediate'

[processes]
  app = 'python -m agent_runner.scheduler'

# Notes:
# - shared-cpu-1x at 256MB is the smallest VM Fly offers. Our service
#   idles at ~80MB and spikes briefly to ~150MB during bot cycles. Fine.
# - Cost: Fly's pay-as-you-go puts a shared-cpu-1x 256MB always-on
#   machine at ~$1.94-$2.02/month. New accounts get a ONE-TIME $5
#   trial credit (Fly killed the permanent free tier in Oct 2024), so
#   first ~2.5 months are effectively free, then ~$2/month ongoing.
#   Set a Fly billing alert at $5/mo so anomalies ping you early.
# - No volumes — bot state.json files live in the container filesystem,
#   which is recreated on each deploy. On restart, the bots self-heal
#   (regime is re-derived from bars; positions are read from Supabase).
# - Machine restart policy: should be 'always' for background workers.
#   fly.toml doesn't have a stable schema for restart_policy yet, so we
#   set it via the CLI. To check / fix:
#
#       fly status -a trading-bot-league-agent-runner
#       # Look at the 'restart' field for the machine.
#
#       fly machine update <machine-id> --restart=always \
#         -a trading-bot-league-agent-runner
#
# - The scheduler is in-memory (no persistent jobstore). After any
#   restart, the next fire is at the NEXT scheduled time — missed runs
#   during the downtime are dropped, never backfilled. This is the
#   correct behavior for trading bots (a 'rebalance' fired 2 hours after
#   the intended time would act on stale data) but is mildly annoying
#   for league_health, which is the most frequent job. Persisting the
#   jobstore would require a Fly volume (~$0.15/GB/month) and SQLAlchemy
#   plumbing — not worth it for ~$2/yr of "saved" health checks.
